<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thinking & More</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            background-color: #fceae2; /* 兜底色 */
        }

        /* 修复移动端背景固定问题 */
        .bg-fixed-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #fceae2 0%, #f7dcd0 50%, #f2cfbf 100%) no-repeat;
            background-size: cover;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .site-title {
                font-size: 2.5rem;
                top: 1.5rem;
            }
        }

        /* 网站标题个性化：粉色 + 手写感字体 + 动态效果 */
        .site-title {
            position: fixed;
            top: 2.5rem;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 100;
            font-family: 'Pacifico', cursive;
            color: #e761bd; /* 鲜艳粉色 */
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.9), 
                         4px 4px 15px rgba(231, 97, 189, 0.2);
            font-size: 4rem;
            letter-spacing: -1px;
            display: block;
            animation: titleFloat 6s ease-in-out infinite;
            cursor: default;
            user-select: none;
            pointer-events: none; /* 防止遮挡下方泡泡点击 */
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        /* 真实蓬松感的云朵：无边框，多重模糊阴影 */
        .cloud-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 100px;
            opacity: 0.3; /* 降低透明度，露出背景色 */
            filter: blur(40px);
            box-shadow: 40px 20px 80px rgba(255, 255, 255, 0.4);
            animation: moveClouds 180s linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }

        .cloud::before {
            width: 80%;
            height: 180%;
            top: -90%;
            left: 10%;
        }

        .cloud::after {
            width: 60%;
            height: 140%;
            top: -60%;
            right: 10%;
        }

        @keyframes moveClouds {
            from { transform: translateX(-600px); }
            to { transform: translateX(100vw); }
        }

        /* 极致虹彩泡泡：支持多色变幻，强化可见度 */
        .bubble {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 25px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2), opacity 0.3s ease;
            backdrop-filter: blur(6px);
            animation: float 12s ease-in-out infinite, wobble 6s ease-in-out infinite;
            word-wrap: break-word;
            max-width: 220px;
            color: #334155;
            font-size: 1rem;
            font-weight: 700;
            user-select: none;
            z-index: 10;
            will-change: transform, opacity;
            
            /* 增强通透感，移除边框 */
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.8) 0%, 
                rgba(255, 255, 255, 0.3) 50%, 
                rgba(255, 255, 255, 0.1) 100%);
            
            border: none;
            box-shadow: none; /* 由 JS 动态设置彩虹色阴影 */
        }

        /* 强化高光点 */
        .bubble::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 30%;
            height: 20%;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 80%);
            border-radius: 50%;
            transform: rotate(-45deg);
            z-index: 2;
        }

        /* 次级高光点 */
        .bubble::before {
            content: '';
            position: absolute;
            bottom: 20%;
            right: 20%;
            width: 15%;
            height: 10%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            filter: blur(1px);
            z-index: 2;
        }

        .bubble:hover {
            transform: scale(1.05) translateY(-10px);
            z-index: 50;
            box-shadow: inset 0 0 60px rgba(255, 255, 255, 0.8), 0 30px 60px rgba(0, 0, 0, 0.1) !important;
        }

        /* 爆裂动画：更具爆发力和灵动感 */
        .bubble.popping {
            animation: burst 0.4s cubic-bezier(0.1, 0.8, 0.3, 1) forwards !important;
            pointer-events: none;
            border-color: rgba(255, 255, 255, 1);
        }

        @keyframes burst {
            0% { transform: scale(1); opacity: 1; filter: brightness(1.2); }
            20% { transform: scale(0.9); opacity: 1; } /* 戳破前的微小收缩 */
            50% { transform: scale(1.3); opacity: 0.8; filter: brightness(1.5) blur(2px); }
            100% { transform: scale(1.6); opacity: 0; filter: brightness(2) blur(10px); }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(var(--mx1), var(--my1)) rotate(2deg); }
            66% { transform: translate(var(--mx2), var(--my2)) rotate(-2deg); }
        }

        @keyframes wobble {
            0%, 100% { border-radius: 50%; }
            25% { border-radius: 48% 52% 52% 48% / 52% 48% 52% 48%; }
            50% { border-radius: 52% 48% 48% 52% / 48% 52% 48% 52%; }
            75% { border-radius: 49% 51% 51% 49% / 51% 49% 51% 49%; }
        }

        /* 弹窗动画 */
        @keyframes fadeInZoom {
            from { opacity: 0; transform: translate(-50%, -40%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .animate-toast {
            animation: fadeInZoom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 底部居中导航：少女感、粉白融合、无边框 */
        .bottom-nav {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .share-btn {
            background: linear-gradient(135deg, rgba(255, 241, 242, 0.9) 0%, rgba(254, 226, 226, 0.8) 100%);
            backdrop-filter: blur(8px);
            border: none;
            padding: 14px 40px;
            border-radius: 100px;
            box-shadow: 0 10px 30px rgba(251, 113, 133, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.15rem;
            font-weight: 700;
            color: #fb7185;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
        }

        .share-btn:hover {
            transform: translateY(-8px) scale(1.05);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 40px rgba(251, 113, 133, 0.3);
            color: #f43f5e;
        }

        .share-btn:active {
            transform: scale(0.95);
        }

        /* 右上角按钮组 */
        .top-left-actions {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 110;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-list {
            position: absolute;
            top: 65px;
            left: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            display: none;
            flex-direction: column;
            gap: 8px;
            min-width: 160px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transform-origin: top left;
            animation: menuAppear 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes menuAppear {
            from { opacity: 0; transform: scale(0.8) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .menu-item {
            padding: 12px 20px;
            border-radius: 16px;
            font-weight: 700;
            color: #fb7185;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .menu-item:hover {
            background: rgba(251, 113, 133, 0.1);
            transform: translateX(5px);
            color: #f43f5e;
        }

        /* 视图切换动画 */
        .view-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s ease, transform 0.5s ease;
            z-index: 50;
        }

        .view-hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }

        /* 故事视图样式 (条文案) */
        .story-list {
            max-width: 800px;
            margin: 160px auto 120px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .story-item {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.6));
            backdrop-filter: blur(10px);
            padding: 25px 35px;
            border-radius: 15px;
            border-left: 8px solid #fb7185;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.02);
            font-size: 1.15rem;
            color: #4b5563;
            line-height: 1.8;
            letter-spacing: 0.5px;
            font-weight: 600;
            animation: slideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            position: relative;
            overflow: hidden;
        }

        .story-item::after {
            content: '';
            position: absolute;
            right: 0;
            bottom: 0;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, transparent 50%, rgba(251, 113, 133, 0.1) 50%);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 告白视图样式 (软木公告栏) */
        .confession-board {
            width: 90%;
            max-width: 1100px;
            height: 75vh;
            margin: 140px auto;
            background-color: #dcb35c;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(139, 90, 43, 0.2) 1px, transparent 1px),
                radial-gradient(circle at 0% 0%, rgba(139, 90, 43, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.1), transparent);
            background-size: 4px 4px, 6px 6px, 100% 100%; /* 模拟软木颗粒 */
            border: 18px solid #b38b4d;
            border-radius: 8px;
            box-shadow: 
                inset 0 0 80px rgba(0,0,0,0.3),
                0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            padding: 50px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            align-content: flex-start;
        }

        .confession-note {
            width: 150px;
            height: 150px;
            background: #fff;
            padding: 35px 15px 15px;
            box-shadow: 
                1px 1px 2px rgba(0,0,0,0.1),
                3px 3px 10px rgba(0,0,0,0.15);
            position: relative;
            transform: rotate(var(--rotation));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.9rem;
            color: #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 22px;
            border-bottom-right-radius: 2px; /* 正方形纸条，不需要卷曲太厉害 */
        }

        /* 横线样式 */
        .note-ruled {
            background-image: 
                linear-gradient(90deg, transparent 39px, #fab1a0 39px, #fab1a0 41px, transparent 41px),
                linear-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 100% 100%, 100% 24px;
        }

        /* 方格样式 */
        .note-grid {
            background-image: 
                linear-gradient(#e5e7eb 1px, transparent 1px),
                linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .confession-note::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0) 95%, rgba(0,0,0,0.05) 100%);
            pointer-events: none;
        }

        .confession-note:hover {
            transform: rotate(0deg) scale(1.1);
            z-index: 10;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        /* 好友动态样式 */
        .feed-item {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .feed-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 40px rgba(251, 113, 133, 0.1);
        }

        .feed-tag {
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 100px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tag-mood { background: #e0f2fe; color: #0ea5e9; }
        .tag-story { background: #fef2f2; color: #f43f5e; }
        .tag-confession { background: #fefce8; color: #ca8a04; }

        .friend-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(251, 113, 133, 0.05);
            border-radius: 20px;
            transition: all 0.3s;
        }

        .friend-item:hover {
            background: rgba(251, 113, 133, 0.1);
        }

        .pin {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2);
        }

        .love-icon {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .top-right-actions {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 110;
            display: flex;
            gap: 12px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            width: 54px;
            height: 54px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fb7185;
            box-shadow: 0 8px 20px rgba(251, 113, 133, 0.15);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            position: relative;
            cursor: pointer;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.9);
            color: #f43f5e;
        }

        .action-btn:active {
            transform: scale(0.9);
        }

        .notification-dot {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 10px;
            height: 10px;
            background: #f43f5e;
            border: 2px solid #fff;
            border-radius: 50%;
        }

        /* 个人信息卡片样式 */
        .profile-card {
            text-align: center;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 35px;
            background: linear-gradient(135deg, #fecdd3 0%, #fda4af 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 15px 30px rgba(251, 113, 133, 0.2);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        .stat-item {
            background: rgba(251, 113, 133, 0.05);
            padding: 20px;
            border-radius: 25px;
        }

        .writing-emoji {
            opacity: 0.3;
            font-size: 1.4rem;
            filter: grayscale(1);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: none;
        }

        #bubble-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        ::-webkit-scrollbar { display: none; }

        /* 消息列表滚动条优化 */
        .custom-scrollbar::-webkit-scrollbar {
            display: block;
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(251, 113, 133, 0.2);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(251, 113, 133, 0.4);
        }
    </style>
</head>
<body class="text-gray-800">
    <!-- 固定背景层，解决移动端兼容性 -->
    <div class="bg-fixed-layer"></div>
    
    <!-- 云朵背景层 -->
    <div class="cloud-container" id="cloud-container"></div>

    <!-- 左上角菜单栏 -->
    <div class="top-left-actions">
        <button id="menu-btn" class="action-btn" title="菜单">
            <i data-lucide="menu" style="width: 24px; height: 24px;"></i>
        </button>
        <div id="menu-list" class="menu-list">
            <div class="menu-item" onclick="openPostModal('分享心情')">
                <i data-lucide="heart" style="width: 18px; height: 18px;"></i>
                分享心情
            </div>
            <div class="menu-item" onclick="openPostModal('分享故事')">
                <i data-lucide="book-open" style="width: 18px; height: 18px;"></i>
                分享故事
            </div>
            <div class="menu-item" onclick="openPostModal('匿名告白')">
                <i data-lucide="mail" style="width: 18px; height: 18px;"></i>
                匿名告白
            </div>
            <div class="menu-divider my-2 border-t border-rose-100/50"></div>
            <div class="menu-item" onclick="openFriendsModal()">
                <i data-lucide="users" style="width: 18px; height: 18px;"></i>
                我的好友
            </div>
            <div class="menu-item" onclick="switchView('friends_feed')">
                <i data-lucide="compass" style="width: 18px; height: 18px;"></i>
                好友动态
            </div>
        </div>
    </div>

    <!-- 顶部标题 -->
    <div class="site-title">Thinking & More</div>

    <!-- 右上角按钮组 -->
    <div class="top-right-actions">
        <button id="open-messages" class="action-btn" title="收到消息">
            <i data-lucide="bell" style="width: 24px; height: 24px;"></i>
            <span class="notification-dot"></span>
        </button>
        <button id="open-profile" class="action-btn" title="个人主页">
            <i data-lucide="user" style="width: 24px; height: 24px;"></i>
        </button>
    </div>

    <!-- 泡泡容器 (分享心情) -->
    <main id="bubble-container" class="view-container overflow-hidden"></main>

    <!-- 故事列表容器 (分享故事) -->
    <main id="story-container" class="view-container view-hidden overflow-y-auto">
        <div class="story-list" id="story-list"></div>
    </main>

    <!-- 告白板容器 (匿名告白) -->
    <main id="confession-container" class="view-container view-hidden overflow-y-auto">
        <div class="confession-board" id="confession-board"></div>
    </main>

    <!-- 好友动态容器 -->
    <main id="friends-feed-container" class="view-container view-hidden overflow-y-auto">
        <div class="max-w-2xl mx-auto py-32 px-6">
            <h2 class="text-3xl font-black text-rose-400 mb-8 flex items-center gap-3">
                <i data-lucide="compass" class="w-8 h-8"></i> 好友动态
            </h2>
            <div id="friends-feed-list" class="space-y-8">
                <!-- 动态内容将由 JS 生成 -->
            </div>
        </div>
    </main>

    <!-- 底部操作栏 -->
    <div class="bottom-nav">
        <button id="main-share-btn" onclick="openPostModal('分享心情')" class="share-btn">
            分享你的心情
        </button>
    </div>

    <!-- 个人主页弹窗 -->
    <div id="profile-modal" class="fixed inset-0 z-[150] hidden flex items-center justify-center p-4 bg-rose-500/5 backdrop-blur-md">
        <div class="bg-white/90 rounded-[2.5rem] p-10 w-full max-w-md shadow-[0_20px_50px_rgba(0,0,0,0.1)] border-none">
            <div class="flex justify-end mb-2">
                <button id="close-profile-modal" class="text-gray-300 hover:text-rose-400 transition-colors">
                    <i data-lucide="x" style="stroke-width: 3px;"></i>
                </button>
            </div>
            <div class="profile-card">
                <div class="profile-avatar">
                    <i data-lucide="smile" style="width: 50px; height: 50px; stroke-width: 1.5px;"></i>
                </div>
                
                <div id="profile-display-area" class="text-center w-full">

            <div class="flex justify-center">

    <script>
        lucide.createIcons();

        const bubbleContainer = document.getElementById('bubble-container');
        const storyContainer = document.getElementById('story-container');
        const confessionContainer = document.getElementById('confession-container');
        const friendsFeedContainer = document.getElementById('friends-feed-container');
        const storyList = document.getElementById('story-list');
        const confessionBoard = document.getElementById('confession-board');
        const friendsFeedList = document.getElementById('friends-feed-list');
        const cloudContainer = document.getElementById('cloud-container');
        const modal = document.getElementById('modal');
        const replyModal = document.getElementById('reply-modal');
        const messageModal = document.getElementById('message-modal');
        const profileModal = document.getElementById('profile-modal');
        const thanksModal = document.getElementById('thanks-modal');
        const friendsModal = document.getElementById('friends-modal');
        const originalThoughtDiv = document.getElementById('original-thought');
        const thoughtInput = document.getElementById('thought-input');
        const replyInput = document.getElementById('reply-input');
        const thanksInput = document.getElementById('thanks-input');
        const messageList = document.getElementById('message-list');
        const friendsList = document.getElementById('friends-list');

        // 安全存储辅助
        const safeStorage = {
            set(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                } catch (e) {
                    console.error('LocalStorage 存储失败:', e);
                }
            },
            get(key, defaultValue) {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    return defaultValue;
                }
            }
        };

        let currentView = 'mood'; 
        let currentPostType = '分享心情';
        let currentBubbleIndex = null;
        let currentReplyIndex = null;
        let thoughts = [
            { text: "感觉生活偶尔也需要按一下暂停键，去吹吹晚风。", type: "分享心情", userId: "TK-SAMPLE01", userName: "治愈系小精灵", timestamp: 1714262400000 },
            { text: "今天的云朵像棉花糖一样，世界真的很温柔。", type: "分享心情", userId: "TK-SAMPLE02", userName: "捕梦人", timestamp: 1714262300000 },
            { text: "虽然还在迷茫，但只要在路上，总会看到光。", type: "分享心情", userId: "TK-SAMPLE03", userName: "追光者", timestamp: 1714262200000 },
            { text: "那是高二的夏天，我们偷偷在天台看夕阳，那一刻我觉得时间停止了。现在回想起来，那种单纯的快乐再也没出现过，但它一直温暖着我。", type: "分享故事", userId: "TK-SAMPLE01", userName: "治愈系小精灵", timestamp: 1714262100000 },
            { text: "第一次学骑自行车的时候，爸爸在后面扶着，他说别怕我在呢。当我终于学会回头看时，他正站在原地笑着挥手。那是关于成长最深刻的记忆。", type: "分享故事", userId: "TK-SAMPLE04", userName: "时光记录员", timestamp: 1714262050000 },
            { text: "希望每一个善良的人都能被温柔以待，晚安世界。", type: "分享心情", userId: "TK-SAMPLE04", userName: "点灯人", timestamp: 1714262000000 },
            { text: "其实我一直都很喜欢你，在每一个你看不到的瞬间。希望你永远开心，哪怕你的世界里没有我。", type: "匿名告白", userId: "TK-SAMPLE02", userName: "捕梦人", timestamp: 1714261900000 },
            { text: "想和你一起去看凌晨四点的海，看第一缕阳光照亮你的侧脸。虽然只是个梦，但我不想醒来。", type: "匿名告白", userId: "TK-SAMPLE05", userName: "深情独白者", timestamp: 1714261850000 }
        ];
        let replies = [];
        let userStats = safeStorage.get('thinking_more_stats', {bubbles: 0, replies: 0});
        let userProfile = safeStorage.get('thinking_more_profile', null);
        let friends = safeStorage.get('thinking_more_friends', []);
        
        let processedThoughts = [];
        safeStorage.set('thinking_more_processed', []);

        // 全局同步数据加载
        async function loadData() {
            try {
                const response = await fetch('/api/data');
                if (!response.ok) throw new Error('Server unreachable');
                const data = await response.json();
                
                // 只有在成功获取数据且数据不为空时才覆盖本地
                if (data.thoughts && data.thoughts.length > 0) {
                    thoughts = data.thoughts;
                }
                if (data.replies) {
                    replies = data.replies;
                }
                
                updateConnectionStatus(true);
            } catch (error) {
                console.error('同步数据失败，使用本地/打样数据:', error);
                updateConnectionStatus(false);
            } finally {
                // 无论成功失败，都渲染当前视图
                renderCurrentView();
                updateNotificationDot();
                updateStats();
            }
        }

        function renderCurrentView() {
            if (currentView === 'mood') renderBubbles();
            if (currentView === 'story') renderStories();
            if (currentView === 'confession') renderConfessions();
            if (currentView === 'friends_feed') renderFriendsFeed();
        }

        function updateConnectionStatus(online) {
            const statusDot = document.getElementById('sync-status-dot');
            const statusText = document.getElementById('sync-status-text');
            if (statusDot && statusText) {
                statusDot.className = `w-2 h-2 rounded-full ${online ? 'bg-green-400' : 'bg-amber-400 animate-pulse'}`;
                statusText.textContent = online ? '已连接云端同步' : '本地模式 (同步服务器未就绪)';
            }
        }

        // 提交数据到服务器
        async function syncData(endpoint, item) {
            try {
                await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(item)
                });
                await loadData(); // 重新加载以获取最新状态
            } catch (error) {
                console.error('同步数据失败:', error);
            }
        }

        // 初始化用户信息
        function initUserProfile() {
            if (!userProfile) {
                const adjectives = [
                    '治愈系', '温柔的', '闪闪发光的', '爱笑的', '静谧的', '勇敢的', '自由的', '梦幻的',
                    '微醺的', '清新的', '热烈的', '恬静的', '明亮的', '婉约的', '率真的', '睿智的',
                    '深情的', '洒脱的', '灵动的', '纯粹的', '坚毅的', '淡然的', '热衷的', '专注的'
                ];
                const nouns = [
                    '小精灵', '守护者', '旅行者', '记录员', '观察家', '艺术家', '追光者', '漫游者',
                    '收藏家', '独白者', '捕梦人', '夜行人', '倾听者', '见证人', '书写者', '创作者',
                    '探险家', '思想家', '拾荒者', '点灯人', '破风手', '领航员', '摆渡人', '修行者'
                ];
                const randomName = adjectives[Math.floor(Math.random() * adjectives.length)] + 
                                  nouns[Math.floor(Math.random() * nouns.length)];
                
                // 使用时间戳+随机数生成更唯一的 8 位 ID
                const timestamp = Date.now().toString(36).slice(-4).toUpperCase();
                const randomStr = Math.random().toString(36).substr(2, 4).toUpperCase();
                const randomId = 'TK-' + timestamp + randomStr;
                
                userProfile = {
                    name: randomName,
                    id: randomId
                };
                localStorage.setItem('thinking_more_profile', JSON.stringify(userProfile));
            }
            document.getElementById('profile-name').textContent = userProfile.name;
            document.getElementById('profile-id').textContent = 'ID: ' + userProfile.id;
        }
        // 修改个人资料逻辑
        function toggleProfileEdit(show) {
            const displayArea = document.getElementById('profile-display-area');
            const editArea = document.getElementById('profile-edit-area');
            if (show) {
                document.getElementById('edit-name-input').value = userProfile.name;
                document.getElementById('edit-id-input').value = userProfile.id;
                displayArea.classList.add('hidden');
                editArea.classList.remove('hidden');
            } else {
                displayArea.classList.remove('hidden');
                editArea.classList.add('hidden');
            }
        }

        function saveProfileChanges() {
            const newName = document.getElementById('edit-name-input').value.trim();
            const newId = document.getElementById('edit-id-input').value.trim();
            
            if (newName && newId) {
                userProfile.name = newName;
                userProfile.id = newId;
                localStorage.setItem('thinking_more_profile', JSON.stringify(userProfile));
                
                document.getElementById('profile-name').textContent = userProfile.name;
                document.getElementById('profile-id').textContent = 'ID: ' + userProfile.id;
                
                toggleProfileEdit(false);
                alert('个人资料已更新 ✨');
            } else {
                alert('名称和 ID 不能为空哦');
            }
        }

        initUserProfile();
        loadData();
        
        // 每 10 秒自动轮询一次数据，实现准实时同步
        setInterval(loadData, 10000);

        // 切换视图逻辑
        function switchView(view) {
            currentView = view;
            const shareBtn = document.getElementById('main-share-btn');

            [bubbleContainer, storyContainer, confessionContainer, friendsFeedContainer].forEach(c => c.classList.add('view-hidden'));
            
            if (view === 'mood') {
                bubbleContainer.classList.remove('view-hidden');
                shareBtn.textContent = '分享你的心情';
                shareBtn.onclick = () => openPostModal('分享心情');
                renderBubbles();
            }
            if (view === 'story') {
                storyContainer.classList.remove('view-hidden');
                shareBtn.textContent = '分享你的故事';
                shareBtn.onclick = () => openPostModal('分享故事');
                renderStories();
            }
            if (view === 'confession') {
                confessionContainer.classList.remove('view-hidden');
                shareBtn.textContent = '写下匿名告白';
                shareBtn.onclick = () => openPostModal('匿名告白');
                renderConfessions();
            }
            if (view === 'friends_feed') {
                friendsFeedContainer.classList.remove('view-hidden');
                shareBtn.textContent = '发布新动态';
                shareBtn.onclick = () => openPostModal('分享心情');
                renderFriendsFeed();
            }
        }

        // 菜单逻辑
        const menuBtn = document.getElementById('menu-btn');
        const menuList = document.getElementById('menu-list');
        
        menuBtn.onclick = (e) => {
            e.stopPropagation();
            const isHidden = menuList.style.display === 'none' || menuList.style.display === '';
            menuList.style.display = isHidden ? 'flex' : 'none';
        };

        window.onclick = () => {
            menuList.style.display = 'none';
        };

        window.openPostModal = (type) => {
            currentPostType = type;
            const placeholders = {
                '分享心情': '此刻的心情是怎样的？写下来变成泡泡吧...',
                '分享故事': '有什么有趣或难忘的故事想分享吗？',
                '匿名告白': '写下你想对他/她说的悄悄话...'
            };
            
            const btnTexts = {
                '分享心情': '吹个泡泡',
                '分享故事': '拾起这段往事',
                '匿名告白': '寄出这份心意'
            };

            const submitBtn = document.getElementById('submit-thought');
            submitBtn.textContent = btnTexts[type] || '提交';

            // 切换视图
            if (type === '分享心情') switchView('mood');
            if (type === '分享故事') switchView('story');
            if (type === '匿名告白') switchView('confession');

            thoughtInput.placeholder = placeholders[type] || '写下你的想法...';
            modal.classList.remove('hidden');
            menuList.style.display = 'none';
        };

        // 统计逻辑
        function updateStats() {
            document.getElementById('stat-bubbles').textContent = userStats.bubbles;
            document.getElementById('stat-replies').textContent = replies.length;
        }

        // 更新消息通知红点
        function updateNotificationDot() {
            const dot = document.querySelector('.notification-dot');
            const hasUnread = replies.some(r => r.toUserId === userProfile.id && !r.isRead);
            dot.style.display = hasUnread ? 'block' : 'none';
        }
        updateNotificationDot();
        updateStats();

        // 渲染故事列表
        function renderStories() {
            storyList.innerHTML = '';
            thoughts
                .filter(t => t.type === '分享故事' && !processedThoughts.includes(`${t.userId}-${t.timestamp}`))
                .reverse()
                .forEach(t => {
                const item = document.createElement('div');
                item.className = 'story-item';
                item.textContent = t.text;
                storyList.appendChild(item);
            });
        }

        // 渲染告白板
        function renderConfessions() {
            confessionBoard.innerHTML = '';
            const loveIcons = ['❤️', '💖', '💍', '💌', '✨', '🌹', '🦋'];
            const pinColors = ['#ff4d4d', '#fffa65', '#32ff7e', '#7d5fff', '#18dcff'];
            const noteStyles = ['note-ruled', 'note-grid'];
            
            thoughts
                .filter(t => t.type === '匿名告白' && !processedThoughts.includes(`${t.userId}-${t.timestamp}`))
                .forEach((t, i) => {
                const note = document.createElement('div');
                const styleClass = noteStyles[Math.floor(Math.random() * noteStyles.length)];
                note.className = `confession-note ${styleClass}`;
                const rotation = (Math.random() * 10 - 5) + 'deg';
                note.style.setProperty('--rotation', rotation);
                
                const pin = document.createElement('div');
                pin.className = 'pin';
                pin.style.backgroundColor = pinColors[Math.floor(Math.random() * pinColors.length)];
                
                const icon = document.createElement('div');
                icon.className = 'love-icon';
                icon.textContent = loveIcons[Math.floor(Math.random() * loveIcons.length)];
                
                note.innerHTML = t.text;
                note.appendChild(pin);
                note.appendChild(icon);
                
                // 告白也可以被回复
                note.onclick = () => {
                    currentBubbleIndex = thoughts.indexOf(t);
                    originalThoughtDiv.textContent = t.text;
                    replyModal.classList.remove('hidden');
                };
                
                confessionBoard.appendChild(note);
            });
        }

        // 渲染消息列表
        function renderMessages() {
            const myReplies = replies.filter(r => r.toUserId === userProfile.id);
            if (myReplies.length === 0) {
                messageList.innerHTML = `
                    <div class="p-6 bg-rose-50/50 rounded-3xl text-gray-500 text-center italic">
                        暂时还没有收到新的回应哦...
                    </div>`;
                return;
            }

            // 先生成带索引的 HTML 数组，再反转显示，确保索引对应正确
            const messageHTMLs = myReplies.map((reply) => {
                // 在全局 replies 数组中找到该回复的真实索引，用于后续操作
                const globalIndex = replies.findIndex(r => r.timestamp === reply.timestamp && r.replyText === reply.replyText);
                return `
                <div class="p-6 bg-rose-50/50 rounded-3xl space-y-3 relative group transition-all hover:bg-rose-50">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-2 h-2 bg-rose-300 rounded-full"></div>
                        <span class="text-[10px] text-rose-300 font-black uppercase tracking-widest">Received Reply</span>
                    </div>
                    <div class="text-gray-400 text-xs italic mb-1">“${reply.originalText}”</div>
                    <div class="text-gray-700 font-bold leading-relaxed">${reply.replyText}</div>
                    ${reply.thanksText ? `
                        <div class="mt-4 pt-4 border-t border-rose-100/50 flex items-start gap-3">
                            <span class="text-rose-400">✨</span>
                            <div class="text-rose-400 text-sm font-bold italic">我的感谢：${reply.thanksText}</div>
                        </div>
                    ` : `
                        <div class="flex justify-end">
                            <button onclick="openThanksModal(${globalIndex})" class="text-xs bg-rose-200 hover:bg-rose-300 text-white px-4 py-2 rounded-full transition-all font-bold">
                                答复/感谢
                            </button>
                        </div>
                    `}
                </div>
            `});
            
            messageList.innerHTML = messageHTMLs.reverse().join('');
        }

        // 显示感谢弹窗
        window.openThanksModal = (index) => {
            currentReplyIndex = index;
            thanksInput.value = '';
            thanksModal.classList.remove('hidden');
        };

        // 寄出感谢逻辑
        document.getElementById('confirm-thanks').onclick = async () => {
            const text = thanksInput.value.trim();
            if (text && currentReplyIndex !== null) {
                const updatedReply = { ...replies[currentReplyIndex], thanksText: text };
                await syncData('/api/replies/update', updatedReply);
                
                thanksModal.classList.add('hidden');
                
                // 成功提示
                const toast = document.createElement('div');
                toast.className = 'fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-[200] bg-white/95 backdrop-blur-md px-10 py-5 rounded-[2rem] shadow-2xl text-rose-400 font-bold animate-bounce border-none flex items-center gap-3';
                toast.innerHTML = '<span>✨</span> 感谢信已通过泡泡送达对方！';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }
        };

        document.getElementById('cancel-thanks').onclick = () => thanksModal.classList.add('hidden');

        // 消息弹窗逻辑
        document.getElementById('open-messages').onclick = async () => {
            // 标记所有属于当前用户的消息为已读并同步
            const myReplies = replies.filter(r => r.toUserId === userProfile.id && !r.isRead);
            for (const r of myReplies) {
                const updatedReply = { ...r, isRead: true };
                await syncData('/api/replies/update', updatedReply);
            }
            
            renderMessages();
            messageModal.classList.remove('hidden');
        };
        document.getElementById('close-message-modal').onclick = () => messageModal.classList.add('hidden');

        // 个人主页逻辑
        document.getElementById('open-profile').onclick = () => {
            updateStats();
            profileModal.classList.remove('hidden');
        };
        document.getElementById('close-profile-modal').onclick = () => profileModal.classList.add('hidden');

        // 漫画风格云朵生成
        function createClouds() {
            for (let i = 0; i < 12; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud';
                const w = Math.random() * 200 + 150;
                cloud.style.width = `${w}px`;
                cloud.style.height = `${w * 0.5}px`;
                cloud.style.top = `${Math.random() * 80}%`;
                cloud.style.left = `${Math.random() * 100}%`;
                cloud.style.animationDelay = `${Math.random() * 100}s`;
                cloud.style.animationDuration = `${Math.random() * 60 + 60}s`;
                cloudContainer.appendChild(cloud);
            }
        }
        createClouds();

        function renderBubbles() {
            // 使用 Map 记录当前页面上的泡泡，通过唯一 ID 追踪
            const currentBubbleIds = new Set();
            
            thoughts.forEach((thought, index) => {
                const thoughtKey = `${thought.userId}-${thought.timestamp}`;
                if ((!thought.type || thought.type === '分享心情') && !processedThoughts.includes(thoughtKey)) {
                    currentBubbleIds.add(thoughtKey);
                    
                    // 如果泡泡已经存在，跳过重新创建，防止“跳变”
                    if (document.getElementById(`bubble-${thoughtKey}`)) return;
                    
                    createBubble(thought, thoughtKey);
                }
            });

            // 移除不再存在于 thoughts 列表中的泡泡
            const allBubbles = bubbleContainer.querySelectorAll('.bubble');
            allBubbles.forEach(b => {
                const id = b.id.replace('bubble-', '');
                if (!currentBubbleIds.has(id)) {
                    b.classList.add('popping');
                    setTimeout(() => b.remove(), 400);
                }
            });
        }

        function createBubble(thought, id) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.id = `bubble-${id}`;
            
            const baseSize = window.innerWidth < 600 ? 100 : 150;
            const randomSize = window.innerWidth < 600 ? 40 : 60;
            const size = Math.floor(Math.random() * randomSize) + baseSize; 
            
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;

            // 随机生成彩虹色组合
            const hues = [
                Math.floor(Math.random() * 360),
                Math.floor(Math.random() * 360),
                Math.floor(Math.random() * 360)
            ];
            
            bubble.style.boxShadow = `
                inset 0 0 25px rgba(255, 255, 255, 0.7),
                inset 20px 0 60px hsla(${hues[0]}, 90%, 75%, 0.5),
                inset -20px 0 60px hsla(${hues[1]}, 90%, 75%, 0.5),
                inset 0 20px 60px hsla(${hues[2]}, 90%, 75%, 0.5),
                0 15px 35px rgba(0, 0, 0, 0.05)
            `;

            const maxX = window.innerWidth - size - 20;
            const maxY = window.innerHeight - size - 120;
            const left = Math.max(10, Math.floor(Math.random() * maxX));
            const top = Math.max(60, Math.floor(Math.random() * maxY));
            
            bubble.style.left = `${left}px`;
            bubble.style.top = `${top}px`;
            
            // 大范围全屏漂浮感
            bubble.style.animationDelay = `${Math.random() * -30}s`;
            bubble.style.animationDuration = `${Math.random() * 20 + 30}s, ${Math.random() * 4 + 4}s`; 
            
            // 为每个泡泡设置大范围的随机位移 (使用 vw/vh 确保全屏感)
            const driftRangeX = 40; // 左右漂移 40vw
            const driftRangeY = 40; // 上下漂移 40vh
            
            bubble.style.setProperty('--mx1', `${Math.random() * driftRangeX * 2 - driftRangeX}vw`);
            bubble.style.setProperty('--my1', `${Math.random() * driftRangeY * 2 - driftRangeY}vh`);
            bubble.style.setProperty('--mx2', `${Math.random() * driftRangeX * 2 - driftRangeX}vw`);
            bubble.style.setProperty('--my2', `${Math.random() * driftRangeY * 2 - driftRangeY}vh`);

            bubble.textContent = thought.text;

            // 交互逻辑：手指拨动改变走向
            let isDragging = false;
            let startX, startY;
            let lastX, lastY;
            let startTime;

            bubble.onpointerdown = (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                lastX = startX;
                lastY = startY;
                startTime = Date.now();
                bubble.style.transition = 'none'; // 拖动时禁用过渡
                bubble.setPointerCapture(e.pointerId);
            };

            bubble.onpointermove = (e) => {
                if (!isDragging) return;
                
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                
                // 实时更新位置
                const currentLeft = parseFloat(bubble.style.left);
                const currentTop = parseFloat(bubble.style.top);
                bubble.style.left = `${currentLeft + dx}px`;
                bubble.style.top = `${currentTop + dy}px`;
                
                lastX = e.clientX;
                lastY = e.clientY;
            };

            bubble.onpointerup = (e) => {
                if (!isDragging) return;
                isDragging = false;
                bubble.releasePointerCapture(e.pointerId);
                
                const duration = Date.now() - startTime;
                const totalDist = Math.sqrt(Math.pow(e.clientX - startX, 2) + Math.pow(e.clientY - startY, 2));

                // 如果移动距离很小且时间短，视为点击
                if (totalDist < 10 && duration < 300) {
                    const index = thoughts.findIndex(t => `${t.userId}-${t.timestamp}` === id);
                    currentBubbleIndex = index;
                    originalThoughtDiv.textContent = `“${thought.text}”`;
                    replyModal.classList.remove('hidden');
                } else {
                    // 否则视为“拨动”，改变未来的走向变量
                    const moveX = (e.clientX - startX) * 0.5; // 拨动的力度
                    const moveY = (e.clientY - startY) * 0.5;
                    
                    // 将拨动的方向注入到 CSS 变量中，改变它未来的漂流轨迹
                    const currentMx1 = parseFloat(bubble.style.getPropertyValue('--mx1')) || 0;
                    const currentMy1 = parseFloat(bubble.style.getPropertyValue('--my1')) || 0;
                    
                    // 转换 px 到 vw/vh 的粗略估算
                    const vw = moveX / window.innerWidth * 100;
                    const vh = moveY / window.innerHeight * 100;
                    
                    bubble.style.setProperty('--mx1', `${currentMx1 + vw}vw`);
                    bubble.style.setProperty('--my1', `${currentMy1 + vh}vh`);
                    
                    // 恢复平滑动画
                    bubble.style.transition = 'left 0.3s ease-out, top 0.3s ease-out';
                }
            };

            bubbleContainer.appendChild(bubble);
        }

        // 初始数据已由 loadData 处理
        // 初始化渲染已由 loadData 处理

        // 提交逻辑
        document.getElementById('close-modal').onclick = () => modal.classList.add('hidden');
        document.getElementById('submit-thought').onclick = async () => {
            const text = thoughtInput.value.trim();
            if (text) {
                const newThought = {
                    text,
                    type: currentPostType,
                    timestamp: Date.now(),
                    userId: userProfile.id,
                    userName: userProfile.name
                };
                await syncData('/api/thoughts', newThought);
                
                // 更新个人统计：吹出的泡泡 (本地存储即可)
                userStats.bubbles++;
                localStorage.setItem('thinking_more_stats', JSON.stringify(userStats));
                updateStats();
                
                thoughtInput.value = '';
                modal.classList.add('hidden');

                // 自动切换到对应视图
                if (currentPostType === '分享心情') switchView('mood');
                if (currentPostType === '分享故事') switchView('story');
                if (currentPostType === '匿名告白') switchView('confession');
            }
        };

        // 回复与实现逻辑
        document.getElementById('close-reply-modal').onclick = () => replyModal.classList.add('hidden');
        document.getElementById('submit-reply').onclick = async () => {
            const replyText = replyInput.value.trim();
            if (currentBubbleIndex !== null && replyText) {
                const targetThought = thoughts[currentBubbleIndex];
                const thoughtKey = `${targetThought.userId}-${targetThought.timestamp}`;
                const bubbleEl = document.getElementById(`bubble-${thoughtKey}`);
                const originalText = targetThought.text;

                // 1. 立即关闭弹窗，不等待
                replyModal.classList.add('hidden');
                
                // 2. 触发爆裂动画 (如果是泡泡)
                if (bubbleEl) {
                    bubbleEl.classList.add('popping');
                }
                
                // 3. 动画完成后再同步到服务器
                setTimeout(async () => {
                    // 发送回复
                    await syncData('/api/replies', {
                        originalText,
                        replyText,
                        timestamp: Date.now(),
                        toUserId: targetThought.userId,
                        fromUserId: userProfile.id,
                        isRead: false
                    });

                    // 不再从服务器移除，而是标记为本地已处理
                    processedThoughts.push(thoughtKey);
                    localStorage.setItem('thinking_more_processed', JSON.stringify(processedThoughts));
                    
                    // 重新渲染当前视图以隐藏已处理的内容
                    if (currentView === 'mood') renderBubbles();
                    if (currentView === 'story') renderStories();
                    if (currentView === 'confession') renderConfessions();
                    if (currentView === 'friends_feed') renderFriendsFeed();
                    
                    replyInput.value = '';
                    currentBubbleIndex = null;
                }, 400);
            }
        };

        // 好友管理逻辑
        window.openFriendsModal = () => {
            renderFriends();
            friendsModal.classList.remove('hidden');
        };

        document.getElementById('close-friends-modal').onclick = () => friendsModal.classList.add('hidden');

        function renderFriends() {
            if (friends.length === 0) {
                friendsList.innerHTML = `
                    <div class="p-6 bg-rose-50/50 rounded-3xl text-gray-400 text-center italic text-sm">
                        还没有好友，快去搜索 ID 添加吧！
                    </div>`;
                return;
            }

            friendsList.innerHTML = friends.map((friend, i) => `
                <div class="friend-item group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-rose-100 flex items-center justify-center text-rose-400">
                            <i data-lucide="user" style="width: 20px; height: 20px;"></i>
                        </div>
                        <div>
                            <div class="font-bold text-gray-700">${friend.name}</div>
                            <div class="text-[10px] text-rose-300 font-bold tracking-wider">${friend.id}</div>
                        </div>
                    </div>
                    <button onclick="removeFriend(${i})" class="text-gray-300 hover:text-rose-400 transition-colors">
                        <i data-lucide="user-minus" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.removeFriend = (index) => {
            if (confirm(`确定要解除与 ${friends[index].name} 的好友关系吗？`)) {
                friends.splice(index, 1);
                localStorage.setItem('thinking_more_friends', JSON.stringify(friends));
                renderFriends();
                if (currentView === 'friends_feed') renderFriendsFeed();
            }
        };

        document.getElementById('add-friend-btn').onclick = () => {
            const searchInput = document.getElementById('friend-search-input');
            const searchId = searchInput.value.trim().toUpperCase();
            
            if (!searchId) return;
            if (searchId === userProfile.id) {
                alert('不能添加自己为好友哦！');
                return;
            }
            if (friends.some(f => f.id === searchId)) {
                alert('该用户已经是你的好友了！');
                return;
            }

            // 在所有帖子中查找该用户
            const friendPost = thoughts.find(t => t.userId === searchId);
            if (friendPost) {
                const newFriend = {
                    id: friendPost.userId,
                    name: friendPost.userName
                };
                friends.push(newFriend);
                localStorage.setItem('thinking_more_friends', JSON.stringify(friends));
                searchInput.value = '';
                renderFriends();
                
                // 成功提示
                const toast = document.createElement('div');
                toast.className = 'fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-[200] bg-white/95 backdrop-blur-md px-10 py-5 rounded-[2rem] shadow-2xl text-rose-400 font-bold animate-bounce border-none flex items-center gap-3';
                toast.innerHTML = `<span>👥</span> 已成功添加好友：${newFriend.name}`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            } else {
                alert('未找到该 ID 的用户，请确保 ID 正确且对方发表过内容。');
            }
        };

        // 渲染好友动态
        function renderFriendsFeed() {
            const friendIds = friends.map(f => f.id);
            const feedPosts = thoughts
                .filter(t => friendIds.includes(t.userId) && !processedThoughts.includes(`${t.userId}-${t.timestamp}`))
                .reverse();

            if (feedPosts.length === 0) {
                friendsFeedList.innerHTML = `
                    <div class="p-12 bg-white/50 backdrop-blur-md rounded-[2.5rem] text-center space-y-4">
                        <div class="text-5xl">🔭</div>
                        <div class="text-gray-400 font-bold">好友们最近很安静，还没有发表任何内容哦...</div>
                    </div>`;
                return;
            }

            const typeTags = {
                '分享心情': 'tag-mood',
                '分享故事': 'tag-story',
                '匿名告白': 'tag-confession'
            };

            const typeIcons = {
                '分享心情': 'heart',
                '分享故事': 'book-open',
                '匿名告白': 'mail'
            };

            friendsFeedList.innerHTML = feedPosts.map(post => `
                <div class="feed-item space-y-4">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-2xl bg-rose-100 flex items-center justify-center text-rose-400">
                                <i data-lucide="user" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <div class="font-black text-gray-700">${post.userName}</div>
                                <div class="text-[10px] text-gray-400 font-bold tracking-widest uppercase">${new Date(post.timestamp).toLocaleString()}</div>
                            </div>
                        </div>
                        <div class="feed-tag ${typeTags[post.type] || 'tag-mood'} flex items-center gap-1">
                            <i data-lucide="${typeIcons[post.type] || 'heart'}" class="w-3 h-3"></i>
                            ${post.type || '分享心情'}
                        </div>
                    </div>
                    <div class="text-gray-600 font-bold leading-relaxed text-lg">
                        ${post.text}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.onresize = renderBubbles;
        window.onclick = (e) => {
            if (e.target === modal) modal.classList.add('hidden');
            if (e.target === replyModal) replyModal.classList.add('hidden');
            if (e.target === messageModal) messageModal.classList.add('hidden');
            if (e.target === profileModal) profileModal.classList.add('hidden');
            if (e.target === thanksModal) thanksModal.classList.add('hidden');
            if (e.target === friendsModal) friendsModal.classList.add('hidden');
        };
    </script>
</body>
</html>
