<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thinking & More</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            /* 加深后的温暖粉米色背景 */
            background: linear-gradient(135deg, #fceae2 0%, #f7dcd0 50%, #f2cfbf 100%) no-repeat fixed;
            background-size: cover;
            overflow-x: hidden;
            position: relative;
        }

        /* 网站标题个性化：粉色 + 手写感字体 + 动态效果 */
        .site-title {
            position: fixed;
            top: 2.5rem;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 100;
            font-family: 'Pacifico', cursive;
            color: #e761bd; /* 鲜艳粉色 */
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.9), 
                         4px 4px 15px rgba(231, 97, 189, 0.2);
            font-size: 4rem;
            letter-spacing: -1px;
            display: block;
            animation: titleFloat 6s ease-in-out infinite;
            cursor: default;
            user-select: none;
            pointer-events: none; /* 防止遮挡下方泡泡点击 */
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        /* 真实蓬松感的云朵：无边框，多重模糊阴影 */
        .cloud-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 100px;
            opacity: 0.3; /* 降低透明度，露出背景色 */
            filter: blur(40px);
            box-shadow: 40px 20px 80px rgba(255, 255, 255, 0.4);
            animation: moveClouds 180s linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }

        .cloud::before {
            width: 80%;
            height: 180%;
            top: -90%;
            left: 10%;
        }

        .cloud::after {
            width: 60%;
            height: 140%;
            top: -60%;
            right: 10%;
        }

        @keyframes moveClouds {
            from { transform: translateX(-600px); }
            to { transform: translateX(100vw); }
        }

        /* 极致虹彩泡泡：支持多色变幻，强化可见度 */
        .bubble {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 25px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2), opacity 0.3s ease;
            backdrop-filter: blur(6px);
            animation: float 12s ease-in-out infinite, wobble 6s ease-in-out infinite;
            word-wrap: break-word;
            max-width: 220px;
            color: #334155;
            font-size: 1rem;
            font-weight: 700;
            user-select: none;
            z-index: 10;
            will-change: transform, opacity;
            
            /* 增强通透感，移除边框 */
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.8) 0%, 
                rgba(255, 255, 255, 0.3) 50%, 
                rgba(255, 255, 255, 0.1) 100%);
            
            border: none;
            box-shadow: none; /* 由 JS 动态设置彩虹色阴影 */
        }

        /* 强化高光点 */
        .bubble::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 30%;
            height: 20%;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 80%);
            border-radius: 50%;
            transform: rotate(-45deg);
            z-index: 2;
        }

        /* 次级高光点 */
        .bubble::before {
            content: '';
            position: absolute;
            bottom: 20%;
            right: 20%;
            width: 15%;
            height: 10%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            filter: blur(1px);
            z-index: 2;
        }

        .bubble:hover {
            transform: scale(1.05) translateY(-10px);
            z-index: 50;
            box-shadow: inset 0 0 60px rgba(255, 255, 255, 0.8), 0 30px 60px rgba(0, 0, 0, 0.1) !important;
        }

        /* 爆裂动画：更具爆发力和灵动感 */
        .bubble.popping {
            animation: burst 0.4s cubic-bezier(0.1, 0.8, 0.3, 1) forwards !important;
            pointer-events: none;
            border-color: rgba(255, 255, 255, 1);
        }

        @keyframes burst {
            0% { transform: scale(1); opacity: 1; filter: brightness(1.2); }
            20% { transform: scale(0.9); opacity: 1; } /* 戳破前的微小收缩 */
            50% { transform: scale(1.3); opacity: 0.8; filter: brightness(1.5) blur(2px); }
            100% { transform: scale(1.6); opacity: 0; filter: brightness(2) blur(10px); }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(15px, -30px) rotate(1deg); }
            66% { transform: translate(-15px, -45px) rotate(-1deg); }
        }

        @keyframes wobble {
            0%, 100% { border-radius: 50%; }
            25% { border-radius: 48% 52% 52% 48% / 52% 48% 52% 48%; }
            50% { border-radius: 52% 48% 48% 52% / 48% 52% 48% 52%; }
            75% { border-radius: 49% 51% 51% 49% / 51% 49% 51% 49%; }
        }

        /* 弹窗动画 */
        @keyframes fadeInZoom {
            from { opacity: 0; transform: translate(-50%, -40%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .animate-toast {
            animation: fadeInZoom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 底部居中导航：少女感、粉白融合、无边框 */
        .bottom-nav {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .share-btn {
            background: linear-gradient(135deg, rgba(255, 241, 242, 0.9) 0%, rgba(254, 226, 226, 0.8) 100%);
            backdrop-filter: blur(8px);
            border: none;
            padding: 14px 40px;
            border-radius: 100px;
            box-shadow: 0 10px 30px rgba(251, 113, 133, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.15rem;
            font-weight: 700;
            color: #fb7185;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
        }

        .share-btn:hover {
            transform: translateY(-8px) scale(1.05);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 40px rgba(251, 113, 133, 0.3);
            color: #f43f5e;
        }

        .share-btn:active {
            transform: scale(0.95);
        }

        /* 右上角按钮组 */
        .top-left-actions {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 110;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-list {
            position: absolute;
            top: 65px;
            left: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            display: none;
            flex-direction: column;
            gap: 8px;
            min-width: 160px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transform-origin: top left;
            animation: menuAppear 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes menuAppear {
            from { opacity: 0; transform: scale(0.8) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .menu-item {
            padding: 12px 20px;
            border-radius: 16px;
            font-weight: 700;
            color: #fb7185;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .menu-item:hover {
            background: rgba(251, 113, 133, 0.1);
            transform: translateX(5px);
            color: #f43f5e;
        }

        /* 视图切换动画 */
        .view-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s ease, transform 0.5s ease;
            z-index: 50;
        }

        .view-hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }

        /* 故事视图样式 (条文案) */
        .story-list {
            max-width: 800px;
            margin: 160px auto 120px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .story-item {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.6));
            backdrop-filter: blur(10px);
            padding: 25px 35px;
            border-radius: 15px;
            border-left: 8px solid #fb7185;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.02);
            font-size: 1.15rem;
            color: #4b5563;
            line-height: 1.8;
            letter-spacing: 0.5px;
            font-weight: 600;
            animation: slideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            position: relative;
            overflow: hidden;
        }

        .story-item::after {
            content: '';
            position: absolute;
            right: 0;
            bottom: 0;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, transparent 50%, rgba(251, 113, 133, 0.1) 50%);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 告白视图样式 (软木公告栏) */
        .confession-board {
            width: 90%;
            max-width: 1100px;
            height: 75vh;
            margin: 140px auto;
            background-color: #dcb35c;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(139, 90, 43, 0.2) 1px, transparent 1px),
                radial-gradient(circle at 0% 0%, rgba(139, 90, 43, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.1), transparent);
            background-size: 4px 4px, 6px 6px, 100% 100%; /* 模拟软木颗粒 */
            border: 18px solid #b38b4d;
            border-radius: 8px;
            box-shadow: 
                inset 0 0 80px rgba(0,0,0,0.3),
                0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            padding: 50px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            align-content: flex-start;
        }

        .confession-note {
            width: 150px;
            height: 150px;
            background: #fff;
            padding: 35px 15px 15px;
            box-shadow: 
                1px 1px 2px rgba(0,0,0,0.1),
                3px 3px 10px rgba(0,0,0,0.15);
            position: relative;
            transform: rotate(var(--rotation));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.9rem;
            color: #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 22px;
            border-bottom-right-radius: 2px; /* 正方形纸条，不需要卷曲太厉害 */
        }

        /* 横线样式 */
        .note-ruled {
            background-image: 
                linear-gradient(90deg, transparent 39px, #fab1a0 39px, #fab1a0 41px, transparent 41px),
                linear-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 100% 100%, 100% 24px;
        }

        /* 方格样式 */
        .note-grid {
            background-image: 
                linear-gradient(#e5e7eb 1px, transparent 1px),
                linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .confession-note::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0) 95%, rgba(0,0,0,0.05) 100%);
            pointer-events: none;
        }

        .confession-note:hover {
            transform: rotate(0deg) scale(1.1);
            z-index: 10;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .pin {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2);
        }

        .love-icon {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .top-right-actions {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 110;
            display: flex;
            gap: 12px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            width: 54px;
            height: 54px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fb7185;
            box-shadow: 0 8px 20px rgba(251, 113, 133, 0.15);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            position: relative;
            cursor: pointer;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.9);
            color: #f43f5e;
        }

        .action-btn:active {
            transform: scale(0.9);
        }

        .notification-dot {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 10px;
            height: 10px;
            background: #f43f5e;
            border: 2px solid #fff;
            border-radius: 50%;
        }

        /* 个人信息卡片样式 */
        .profile-card {
            text-align: center;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 35px;
            background: linear-gradient(135deg, #fecdd3 0%, #fda4af 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 15px 30px rgba(251, 113, 133, 0.2);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        .stat-item {
            background: rgba(251, 113, 133, 0.05);
            padding: 20px;
            border-radius: 25px;
        }

        .writing-emoji {
            opacity: 0.3;
            font-size: 1.4rem;
            filter: grayscale(1);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: none;
        }

        #bubble-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        ::-webkit-scrollbar { display: none; }

        /* 消息列表滚动条优化 */
        .custom-scrollbar::-webkit-scrollbar {
            display: block;
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(251, 113, 133, 0.2);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(251, 113, 133, 0.4);
        }
    </style>
</head>
<body class="text-gray-800">
    <!-- 云朵背景层 -->
    <div class="cloud-container" id="cloud-container"></div>

    <!-- 左上角菜单栏 -->
    <div class="top-left-actions">
        <button id="menu-btn" class="action-btn" title="菜单">
            <i data-lucide="menu" style="width: 24px; height: 24px;"></i>
        </button>
        <div id="menu-list" class="menu-list">
            <div class="menu-item" onclick="openPostModal('分享心情')">
                <i data-lucide="heart" style="width: 18px; height: 18px;"></i>
                分享心情
            </div>
            <div class="menu-item" onclick="openPostModal('分享故事')">
                <i data-lucide="book-open" style="width: 18px; height: 18px;"></i>
                分享故事
            </div>
            <div class="menu-item" onclick="openPostModal('匿名告白')">
                <i data-lucide="mail" style="width: 18px; height: 18px;"></i>
                匿名告白
            </div>
        </div>
    </div>

    <!-- 顶部标题 -->
    <div class="site-title">Thinking & More</div>

    <!-- 右上角按钮组 -->
    <div class="top-right-actions">
        <button id="open-messages" class="action-btn" title="收到消息">
            <i data-lucide="bell" style="width: 24px; height: 24px;"></i>
            <span class="notification-dot"></span>
        </button>
        <button id="open-profile" class="action-btn" title="个人主页">
            <i data-lucide="user" style="width: 24px; height: 24px;"></i>
        </button>
    </div>

    <!-- 泡泡容器 (分享心情) -->
    <main id="bubble-container" class="view-container overflow-hidden"></main>

    <!-- 故事列表容器 (分享故事) -->
    <main id="story-container" class="view-container view-hidden overflow-y-auto">
        <div class="story-list" id="story-list"></div>
    </main>

    <!-- 告白板容器 (匿名告白) -->
    <main id="confession-container" class="view-container view-hidden overflow-y-auto">
        <div class="confession-board" id="confession-board"></div>
    </main>

    <!-- 底部操作栏 -->
    <div class="bottom-nav">
        <button id="main-share-btn" onclick="openPostModal('分享心情')" class="share-btn">
            分享你的心情
        </button>
    </div>

    <!-- 个人主页弹窗 -->
    <div id="profile-modal" class="fixed inset-0 z-[150] hidden flex items-center justify-center p-4 bg-rose-500/5 backdrop-blur-md">
        <div class="bg-white/90 rounded-[2.5rem] p-10 w-full max-w-md shadow-[0_20px_50px_rgba(0,0,0,0.1)] border-none">
            <div class="flex justify-end mb-2">
                <button id="close-profile-modal" class="text-gray-300 hover:text-rose-400 transition-colors">
                    <i data-lucide="x" style="stroke-width: 3px;"></i>
                </button>
            </div>
            <div class="profile-card">
                <div class="profile-avatar">
                    <i data-lucide="smile" style="width: 50px; height: 50px; stroke-width: 1.5px;"></i>
                </div>
                <h2 id="profile-name" class="text-2xl font-black text-gray-700 mb-1">治愈系小精灵</h2>
                <p id="profile-id" class="text-rose-300 font-bold mb-6">ID: Thinking_9527</p>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="text-2xl font-black text-rose-400" id="stat-bubbles">0</div>
                        <div class="text-xs text-gray-400 font-bold uppercase tracking-wider">吹出的泡泡</div>
                    </div>
                    <div class="stat-item">
                        <div class="text-2xl font-black text-rose-400" id="stat-replies">0</div>
                        <div class="text-xs text-gray-400 font-bold uppercase tracking-wider">收到的温暖</div>
                    </div>
                </div>

                <!-- 新增：网站状态 -->
                <div class="mt-8 pt-8 border-t border-rose-100/50 w-full space-y-6">
                    <div>
                        <div class="text-[10px] text-gray-300 font-black uppercase tracking-widest mb-2">Site Status</div>
                        <div class="flex items-center gap-3 bg-rose-50/50 p-4 rounded-2xl">
                            <div class="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></div>
                            <span class="text-rose-300 font-bold text-xs">本地开发模式 (Localhost)</span>
                        </div>
                    </div>
                </div>
                
                <div class="mt-8 p-6 bg-rose-50/30 rounded-3xl text-sm text-gray-500 italic leading-relaxed">
                    “每一个泡泡都承载着一段时光，
                    愿这里的温柔能治愈你的每一个夜晚。”
                </div>
            </div>
        </div>
    </div>

    <!-- 消息列表弹窗 -->
    <div id="message-modal" class="fixed inset-0 z-[140] hidden flex items-center justify-center p-4 bg-rose-500/5 backdrop-blur-md">
        <div class="bg-white/90 rounded-[2.5rem] p-10 w-full max-w-md shadow-[0_20px_50px_rgba(0,0,0,0.1)] border-none">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black text-rose-400">💌 收到回应</h2>
                <button id="close-message-modal" class="text-gray-300 hover:text-rose-400 transition-colors">
                    <i data-lucide="x" style="stroke-width: 3px;"></i>
                </button>
            </div>
            <div id="message-list" class="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                <!-- 消息内容将由 JS 生成 -->
            </div>
        </div>
    </div>

    <!-- 感谢回复弹窗 -->
    <div id="thanks-modal" class="fixed inset-0 z-[160] hidden flex items-center justify-center p-4 bg-rose-500/10 backdrop-blur-md">
        <div class="bg-white/90 rounded-[2.5rem] p-10 w-full max-w-sm shadow-[0_20px_50px_rgba(0,0,0,0.1)] border-none">
            <h2 class="text-2xl font-black text-rose-400 mb-6">💝 寄送感谢</h2>
            <textarea id="thanks-input" class="w-full h-32 p-6 rounded-3xl bg-rose-50/30 border-none focus:ring-2 focus:ring-rose-200 resize-none mb-6 text-gray-600 font-bold placeholder-rose-200" placeholder="写下你想对这位温暖陌生人说的话..."></textarea>
            <div class="flex gap-4">
                <button id="cancel-thanks" class="flex-1 py-3 rounded-full font-bold text-gray-400 hover:bg-gray-100 transition-all">取消</button>
                <button id="confirm-thanks" class="flex-1 bg-rose-300 hover:bg-rose-400 text-white py-3 rounded-full font-bold shadow-lg transition-all">寄出感谢</button>
            </div>
        </div>
    </div>

    <!-- 提交心情弹窗 -->
    <div id="modal" class="fixed inset-0 z-[120] hidden flex items-center justify-center p-4 bg-sky-500/10 backdrop-blur-md">
        <div class="bg-white/90 rounded-[2.5rem] p-10 w-full max-w-md shadow-[0_20px_50px_rgba(0,0,0,0.1)] border-none">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black text-rose-400">✍️ 记录此刻...</h2>
                <button id="close-modal" class="text-gray-300 hover:text-rose-400 transition-colors">
                    <i data-lucide="x" style="stroke-width: 3px;"></i>
                </button>
            </div>
            <textarea id="thought-input" class="w-full h-48 p-6 rounded-3xl bg-rose-50/30 border-none focus:ring-2 focus:ring-rose-200 resize-none mb-8 text-gray-600 text-lg font-bold placeholder-rose-200" placeholder="近期的困境、想法、体验... 吹一个泡泡把它带走吧。"></textarea>
            <div class="flex justify-center">
                <button id="submit-thought" class="bg-rose-300 hover:bg-rose-400 text-white px-12 py-4 rounded-full transition-all shadow-lg font-black text-xl tracking-widest transform active:scale-95">
                    吹个泡泡
                </button>
            </div>
        </div>
    </div>

    <!-- 回答/实现弹窗 -->
    <div id="reply-modal" class="fixed inset-0 z-[130] hidden flex items-center justify-center p-4 bg-pink-500/10 backdrop-blur-md">
        <div class="bg-white/90 rounded-[2.5rem] p-10 w-full max-w-md shadow-[0_20px_50px_rgba(0,0,0,0.1)] border-none">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-black text-rose-400">💖 温暖回应</h2>
                <button id="close-reply-modal" class="text-gray-300 hover:text-rose-400 transition-colors">
                    <i data-lucide="x" style="stroke-width: 3px;"></i>
                </button>
            </div>
            <div id="original-thought" class="mb-8 p-6 bg-rose-50/50 rounded-3xl italic text-gray-600 font-bold border-none"></div>
            <textarea id="reply-input" class="w-full h-32 p-6 rounded-3xl bg-rose-50/30 border-none focus:ring-2 focus:ring-rose-200 resize-none mb-8 text-gray-600 font-bold placeholder-rose-200" placeholder="写一点安慰的话，回答完这个泡泡就会实现并消散..."></textarea>
            <div class="flex justify-center">
                <button id="submit-reply" class="bg-rose-300 hover:bg-rose-400 text-white px-12 py-4 rounded-full transition-all shadow-lg font-black text-xl tracking-widest transform active:scale-95">
                    温暖回应并实现
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const bubbleContainer = document.getElementById('bubble-container');
        const storyContainer = document.getElementById('story-container');
        const confessionContainer = document.getElementById('confession-container');
        const storyList = document.getElementById('story-list');
        const confessionBoard = document.getElementById('confession-board');
        const cloudContainer = document.getElementById('cloud-container');
        const modal = document.getElementById('modal');
        const replyModal = document.getElementById('reply-modal');
        const messageModal = document.getElementById('message-modal');
        const profileModal = document.getElementById('profile-modal');
        const thanksModal = document.getElementById('thanks-modal');
        const originalThoughtDiv = document.getElementById('original-thought');
        const thoughtInput = document.getElementById('thought-input');
        const replyInput = document.getElementById('reply-input');
        const thanksInput = document.getElementById('thanks-input');
        const messageList = document.getElementById('message-list');

        let currentView = 'mood'; // 'mood', 'story', 'confession'
        let currentPostType = '分享心情';
        let currentBubbleIndex = null;
        let currentReplyIndex = null;
        let thoughts = JSON.parse(localStorage.getItem('thinking_more_thoughts') || '[]');
        let replies = JSON.parse(localStorage.getItem('thinking_more_replies') || '[]');
        let userStats = JSON.parse(localStorage.getItem('thinking_more_stats') || '{"bubbles": 0, "replies": 0}');
        let userProfile = JSON.parse(localStorage.getItem('thinking_more_profile') || 'null');

        // 初始化用户信息
        function initUserProfile() {
            if (!userProfile) {
                const adjectives = ['治愈系', '温柔的', '闪闪发光的', '爱笑的', '静谧的', '勇敢的', '自由的', '梦幻的'];
                const nouns = ['小精灵', '守护者', '旅行者', '记录员', '观察家', '艺术家', '追光者', '漫游者'];
                const randomName = adjectives[Math.floor(Math.random() * adjectives.length)] + 
                                  nouns[Math.floor(Math.random() * nouns.length)];
                const randomId = 'Thinking_' + Math.random().toString(36).substr(2, 6).toUpperCase();
                
                userProfile = {
                    name: randomName,
                    id: randomId
                };
                localStorage.setItem('thinking_more_profile', JSON.stringify(userProfile));
            }
            document.getElementById('profile-name').textContent = userProfile.name;
            document.getElementById('profile-id').textContent = 'ID: ' + userProfile.id;
        }
        initUserProfile();

        // 切换视图逻辑
        function switchView(view) {
            currentView = view;
            const shareBtn = document.getElementById('main-share-btn');
            [bubbleContainer, storyContainer, confessionContainer].forEach(c => c.classList.add('view-hidden'));
            
            if (view === 'mood') {
                bubbleContainer.classList.remove('view-hidden');
                shareBtn.textContent = '分享你的心情';
                shareBtn.onclick = () => openPostModal('分享心情');
            }
            if (view === 'story') {
                storyContainer.classList.remove('view-hidden');
                shareBtn.textContent = '分享你的故事';
                shareBtn.onclick = () => openPostModal('分享故事');
                renderStories();
            }
            if (view === 'confession') {
                confessionContainer.classList.remove('view-hidden');
                shareBtn.textContent = '写下匿名告白';
                shareBtn.onclick = () => openPostModal('匿名告白');
                renderConfessions();
            }
        }

        // 菜单逻辑
        const menuBtn = document.getElementById('menu-btn');
        const menuList = document.getElementById('menu-list');
        
        menuBtn.onclick = (e) => {
            e.stopPropagation();
            const isHidden = menuList.style.display === 'none' || menuList.style.display === '';
            menuList.style.display = isHidden ? 'flex' : 'none';
        };

        window.onclick = () => {
            menuList.style.display = 'none';
        };

        window.openPostModal = (type) => {
            currentPostType = type;
            const placeholders = {
                '分享心情': '此刻的心情是怎样的？写下来变成泡泡吧...',
                '分享故事': '有什么有趣或难忘的故事想分享吗？',
                '匿名告白': '写下你想对他/她说的悄悄话...'
            };
            
            const btnTexts = {
                '分享心情': '吹个泡泡',
                '分享故事': '拾起这段往事',
                '匿名告白': '寄出这份心意'
            };

            const submitBtn = document.getElementById('submit-thought');
            submitBtn.textContent = btnTexts[type] || '提交';

            // 切换视图
            if (type === '分享心情') switchView('mood');
            if (type === '分享故事') switchView('story');
            if (type === '匿名告白') switchView('confession');

            thoughtInput.placeholder = placeholders[type] || '写下你的想法...';
            modal.classList.remove('hidden');
            menuList.style.display = 'none';
        };

        // 统计逻辑
        function updateStats() {
            document.getElementById('stat-bubbles').textContent = userStats.bubbles;
            document.getElementById('stat-replies').textContent = replies.length;
        }

        // 更新消息通知红点
        function updateNotificationDot() {
            const dot = document.querySelector('.notification-dot');
            const hasUnread = replies.some(r => !r.isRead);
            dot.style.display = hasUnread ? 'block' : 'none';
        }
        updateNotificationDot();
        updateStats();

        // 渲染故事列表
        function renderStories() {
            storyList.innerHTML = '';
            thoughts.filter(t => t.type === '分享故事').reverse().forEach(t => {
                const item = document.createElement('div');
                item.className = 'story-item';
                item.textContent = t.text;
                storyList.appendChild(item);
            });
        }

        // 渲染告白板
        function renderConfessions() {
            confessionBoard.innerHTML = '';
            const loveIcons = ['❤️', '💖', '💍', '💌', '✨', '🌹', '🦋'];
            const pinColors = ['#ff4d4d', '#fffa65', '#32ff7e', '#7d5fff', '#18dcff'];
            const noteStyles = ['note-ruled', 'note-grid'];
            
            thoughts.filter(t => t.type === '匿名告白').forEach((t, i) => {
                const note = document.createElement('div');
                const styleClass = noteStyles[Math.floor(Math.random() * noteStyles.length)];
                note.className = `confession-note ${styleClass}`;
                const rotation = (Math.random() * 10 - 5) + 'deg';
                note.style.setProperty('--rotation', rotation);
                
                const pin = document.createElement('div');
                pin.className = 'pin';
                pin.style.backgroundColor = pinColors[Math.floor(Math.random() * pinColors.length)];
                
                const icon = document.createElement('div');
                icon.className = 'love-icon';
                icon.textContent = loveIcons[Math.floor(Math.random() * loveIcons.length)];
                
                note.innerHTML = t.text;
                note.appendChild(pin);
                note.appendChild(icon);
                
                // 告白也可以被回复
                note.onclick = () => {
                    currentBubbleIndex = thoughts.indexOf(t);
                    originalThoughtDiv.textContent = t.text;
                    replyModal.classList.remove('hidden');
                };
                
                confessionBoard.appendChild(note);
            });
        }

        // 渲染消息列表
        function renderMessages() {
            if (replies.length === 0) {
                messageList.innerHTML = `
                    <div class="p-6 bg-rose-50/50 rounded-3xl text-gray-500 text-center italic">
                        暂时还没有收到新的回应哦...
                    </div>`;
                return;
            }

            // 先生成带索引的 HTML 数组，再反转显示，确保索引对应正确
            const messageHTMLs = replies.map((reply, i) => `
                <div class="p-6 bg-rose-50/50 rounded-3xl space-y-3 relative group transition-all hover:bg-rose-50">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-2 h-2 bg-rose-300 rounded-full"></div>
                        <span class="text-[10px] text-rose-300 font-black uppercase tracking-widest">Received Reply</span>
                    </div>
                    <div class="text-gray-400 text-xs italic mb-1">“${reply.originalText}”</div>
                    <div class="text-gray-700 font-bold leading-relaxed">${reply.replyText}</div>
                    ${reply.thanksText ? `
                        <div class="mt-4 pt-4 border-t border-rose-100/50 flex items-start gap-3">
                            <span class="text-rose-400">✨</span>
                            <div class="text-rose-400 text-sm font-bold italic">我的感谢：${reply.thanksText}</div>
                        </div>
                    ` : `
                        <div class="flex justify-end">
                            <button onclick="openThanksModal(${i})" class="text-xs bg-rose-200 hover:bg-rose-300 text-white px-4 py-2 rounded-full transition-all font-bold">
                                答复/感谢
                            </button>
                        </div>
                    `}
                </div>
            `);
            
            messageList.innerHTML = messageHTMLs.reverse().join('');
        }

        // 显示感谢弹窗
        window.openThanksModal = (index) => {
            currentReplyIndex = index;
            thanksInput.value = '';
            thanksModal.classList.remove('hidden');
        };

        // 寄出感谢逻辑
        document.getElementById('confirm-thanks').onclick = () => {
            const text = thanksInput.value.trim();
            if (text && currentReplyIndex !== null) {
                replies[currentReplyIndex].thanksText = text;
                localStorage.setItem('thinking_more_replies', JSON.stringify(replies));
                renderMessages();
                thanksModal.classList.add('hidden');
                
                // 成功提示
                const toast = document.createElement('div');
                toast.className = 'fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-[200] bg-white/95 backdrop-blur-md px-10 py-5 rounded-[2rem] shadow-2xl text-rose-400 font-bold animate-bounce border-none flex items-center gap-3';
                toast.innerHTML = '<span>✨</span> 感谢信已通过泡泡送达对方！';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }
        };

        document.getElementById('cancel-thanks').onclick = () => thanksModal.classList.add('hidden');

        // 消息弹窗逻辑
        document.getElementById('open-messages').onclick = () => {
            // 标记所有消息为已读
            replies.forEach(r => r.isRead = true);
            localStorage.setItem('thinking_more_replies', JSON.stringify(replies));
            updateNotificationDot();
            
            renderMessages();
            messageModal.classList.remove('hidden');
        };
        document.getElementById('close-message-modal').onclick = () => messageModal.classList.add('hidden');

        // 个人主页逻辑
        document.getElementById('open-profile').onclick = () => {
            updateStats();
            profileModal.classList.remove('hidden');
        };
        document.getElementById('close-profile-modal').onclick = () => profileModal.classList.add('hidden');

        // 漫画风格云朵生成
        function createClouds() {
            for (let i = 0; i < 12; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud';
                const w = Math.random() * 200 + 150;
                cloud.style.width = `${w}px`;
                cloud.style.height = `${w * 0.5}px`;
                cloud.style.top = `${Math.random() * 80}%`;
                cloud.style.left = `${Math.random() * 100}%`;
                cloud.style.animationDelay = `${Math.random() * 100}s`;
                cloud.style.animationDuration = `${Math.random() * 60 + 60}s`;
                cloudContainer.appendChild(cloud);
            }
        }
        createClouds();

        function createBubble(thought, index) {
            if (thought.type && thought.type !== '分享心情') return; // 只在心情视图显示泡泡
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.id = `bubble-${index}`;
            
            const size = Math.floor(Math.random() * 60) + 150; 
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;

            // 随机生成彩虹色组合
            const hues = [
                Math.floor(Math.random() * 360), // 主色相
                Math.floor(Math.random() * 360), // 次色相
                Math.floor(Math.random() * 360)  // 辅助色相
            ];
            
            bubble.style.boxShadow = `
                inset 0 0 25px rgba(255, 255, 255, 0.7),
                inset 20px 0 60px hsla(${hues[0]}, 90%, 75%, 0.5),
                inset -20px 0 60px hsla(${hues[1]}, 90%, 75%, 0.5),
                inset 0 20px 60px hsla(${hues[2]}, 90%, 75%, 0.5),
                0 15px 35px rgba(0, 0, 0, 0.05)
            `;

            const maxX = window.innerWidth - size - 40;
            const maxY = window.innerHeight - size - 160;
            const left = Math.max(20, Math.floor(Math.random() * maxX));
            const top = Math.max(60, Math.floor(Math.random() * maxY));
            
            bubble.style.left = `${left}px`;
            bubble.style.top = `${top}px`;
            bubble.style.animationDelay = `${Math.random() * -10}s`; // 随机起始位置

            bubble.textContent = thought.text;

            bubble.onclick = () => {
                currentBubbleIndex = index;
                originalThoughtDiv.textContent = `“${thought.text}”`;
                replyModal.classList.remove('hidden');
            };

            bubbleContainer.appendChild(bubble);
        }

        function renderBubbles() {
            bubbleContainer.innerHTML = '';
            thoughts.forEach((thought, index) => {
                if (!thought.type || thought.type === '分享心情') {
                    createBubble(thought, index);
                }
            });
        }

        if (thoughts.length === 0) {
            thoughts = [
                { text: "感觉生活偶尔也需要按一下暂停键。" },
                { text: "今天的风吹得很温柔，像被世界拥抱了。" },
                { text: "虽然还在迷茫，但脚步没有停下。" },
                { text: "发现了一家超好吃的甜品店！" },
                { text: "希望每一个善良的人都能被温柔以待。" }
            ];
            localStorage.setItem('thinking_more_thoughts', JSON.stringify(thoughts));
        }
        // 初始化渲染
        renderBubbles();
        renderStories();
        renderConfessions();

        // 提交逻辑
        document.getElementById('close-modal').onclick = () => modal.classList.add('hidden');
        document.getElementById('submit-thought').onclick = () => {
            const text = thoughtInput.value.trim();
            if (text) {
                const newThought = {
                    text,
                    type: currentPostType,
                    timestamp: Date.now()
                };
                thoughts.push(newThought);
                localStorage.setItem('thinking_more_thoughts', JSON.stringify(thoughts));
                
                // 更新个人统计：吹出的泡泡
                userStats.bubbles++;
                localStorage.setItem('thinking_more_stats', JSON.stringify(userStats));
                updateStats();

                if (currentPostType === '分享心情') renderBubbles();
                if (currentPostType === '分享故事') renderStories();
                if (currentPostType === '匿名告白') renderConfessions();
                
                thoughtInput.value = '';
                modal.classList.add('hidden');

                // 自动切换到对应视图
                if (currentPostType === '分享心情') switchView('mood');
                if (currentPostType === '分享故事') switchView('story');
                if (currentPostType === '匿名告白') switchView('confession');
            }
        };

        // 回复与实现逻辑
        document.getElementById('close-reply-modal').onclick = () => replyModal.classList.add('hidden');
        document.getElementById('submit-reply').onclick = () => {
            const replyText = replyInput.value.trim();
            if (currentBubbleIndex !== null && replyText) {
                const bubbleEl = document.getElementById(`bubble-${currentBubbleIndex}`);
                const originalText = thoughts[currentBubbleIndex].text;

                if (bubbleEl) {
                    // 1. 立即关闭弹窗，不等待
                    replyModal.classList.add('hidden');
                    
                    // 2. 触发爆裂动画
                    bubbleEl.classList.add('popping');
                    
                    // 3. 动画完成后再处理数据
                    setTimeout(() => {
                        // 保存回应消息
                        replies.push({
                            originalText,
                            replyText,
                            timestamp: Date.now()
                        });
                        localStorage.setItem('thinking_more_replies', JSON.stringify(replies));
                        updateNotificationDot();

                        bubbleEl.remove();
                        thoughts.splice(currentBubbleIndex, 1);
                        localStorage.setItem('thinking_more_thoughts', JSON.stringify(thoughts));
                        
                        replyInput.value = '';
                        currentBubbleIndex = null;
                    }, 400);
                }
            }
        };

        window.onresize = renderBubbles;
        window.onclick = (e) => {
            if (e.target === modal) modal.classList.add('hidden');
            if (e.target === replyModal) replyModal.classList.add('hidden');
            if (e.target === messageModal) messageModal.classList.add('hidden');
            if (e.target === profileModal) profileModal.classList.add('hidden');
            if (e.target === thanksModal) thanksModal.classList.add('hidden');
        };
    </script>
</body>
</html>
